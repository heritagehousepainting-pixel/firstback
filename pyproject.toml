[tool.ruff]
line-length = 100
target-version = "py312"
exclude = [
  ".git",
  ".venv",
  "__pycache__",
  "onboarding/fonts",
  "screenshots",
]

[tool.ruff.lint]
# Bootstrap with correctness checks that should stay quiet on the current repo.
# Broaden this once the legacy standalone test scripts are normalized.
select = ["F821", "F822", "F823"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
