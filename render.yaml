# Render Blueprint for RingBack.
#
# To deploy: push this repo to GitHub, then in the Render dashboard choose
# "New +" -> "Blueprint" and point it at the repo. Render reads this file and
# provisions the service + disk + env vars below. Add the real SECRETS (AI brain
# key, Twilio, SMTP, Google) in the dashboard afterward so they never enter git.
#
# Why not Vercel: RingBack needs an always-on process, a persistent database, and
# a background scheduler. Render gives all three; serverless hosts don't.

services:
  - type: web
    name: ringback
    runtime: python
    plan: starter                 # ~$7/mo, always-on (the free plan sleeps + has no disk)
    buildCommand: pip install -r requirements.txt
    # ONE worker so exactly one reminder ticker runs and SQLite has a single
    # writer; threads handle request concurrency. Ample for a single business.
    startCommand: gunicorn app:app --workers 1 --threads 8 --timeout 120 --bind 0.0.0.0:$PORT
    disk:
      name: ringback-data
      mountPath: /var/data        # the SQLite DB + WAL live here -> survives deploys
      sizeGB: 1
    healthCheckPath: /login
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: RINGBACK_DB_PATH
        value: /var/data/ringback.db
      - key: RINGBACK_SECRET        # signs login cookies
        generateValue: true
      - key: RINGBACK_TASKS_SECRET  # guards the scheduler endpoint /tasks/run-due
        generateValue: true
      - key: RINGBACK_INTERNAL_SECRET  # shared secret for the voice service's /internal/voice/turn seam
        generateValue: true
      - key: RINGBACK_RUN_TICKER    # start the reminders/follow-ups scheduler in-process
        value: "1"
      - key: RINGBACK_HTTPS         # secure session cookies (Render serves HTTPS)
        value: "1"
      - key: RINGBACK_TZ            # <-- set to the business's timezone
        value: America/New_York
      # ---- Add these as SECRETS in the Render dashboard (Environment tab) ----
      # The AI brain (pick one):
      #   RINGBACK_PROVIDER = claude     and  ANTHROPIC_API_KEY = sk-ant-...
      #   RINGBACK_PROVIDER = minimax    and  MINIMAX_API_KEY   = ...
      # (No key set => safe demo responder, fine for a first smoke test.)
      #
      # Real texts/calls (later, see USER_TO_DO.md):
      #   PUBLIC_BASE_URL = https://<your-render-url>
      #   TWILIO_ACCOUNT_SID / TWILIO_AUTH_TOKEN / TWILIO_FROM_NUMBER
      # AI voice callback (after deploying the ringback-voice service below):
      #   RINGBACK_VOICE_URL = https://ringback-voice.onrender.com  (that service's URL)
      # Email alerts (optional):
      #   SMTP_HOST / SMTP_USER / SMTP_PASS / SMTP_FROM
      # First-login owner (optional; defaults to the seeded creds you then change):
      #   RINGBACK_OWNER_EMAIL / RINGBACK_OWNER_PASSWORD

# ---- The AI voice agent (Phase 3) as a second service. ----
# The voice service is STATELESS: it relays each spoken turn to the web app's
# /internal/voice/turn endpoint (see voice_service.py + app.py), so it needs NO
# database disk and NO AI key — the web app owns the DB and the brain, which keeps
# booking writes single-writer (the SQLite-can't-be-shared problem, solved).
# To turn the voice leg ON:
#   1. Deploy — this service comes up at e.g. https://ringback-voice.onrender.com.
#   2. On the WEB service above, set RINGBACK_VOICE_URL to THIS service's URL (in the
#      dashboard). That env var is the master switch app.py checks for "reply CALL".
#   3. Connect Twilio (creds + a number + PUBLIC_BASE_URL) per USER_TO_DO.md, and
#      finish A2P 10DLC + the TCPA review before real customers.
# Leaving RINGBACK_VOICE_URL unset on the web service keeps voice dormant (an SMS
# "call me" just continues by text), even with this service running.
  - type: web
    name: ringback-voice
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn voice_service:fastapi_app --host 0.0.0.0 --port $PORT
    healthCheckPath: /twiml
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      # The web app's public base URL (needs the https:// scheme) — where this
      # service relays each turn. Set it in the dashboard after the web app is up.
      - key: RINGBACK_WEB_URL
        sync: false
      # The shared seam secret — synced automatically from the web service.
      - key: RINGBACK_INTERNAL_SECRET
        fromService:
          type: web
          name: ringback
          envVarKey: RINGBACK_INTERNAL_SECRET
      # Optional: override Twilio's ConversationRelay TTS voice id.
      # - key: RINGBACK_VOICE_TTS
      #   value: en-US-Neural2-J
