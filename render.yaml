# Render Blueprint for FirstBack.
#
# To deploy: push this repo to GitHub, then in the Render dashboard choose
# "New +" -> "Blueprint" and point it at the repo. Render reads this file and
# provisions the service + disk + env vars below. Add the real SECRETS (AI brain
# key, Twilio, SMTP, Google) in the dashboard afterward so they never enter git.
#
# Why not Vercel: FirstBack needs an always-on process, a persistent database, and
# a background scheduler. Render gives all three; serverless hosts don't.

services:
  # STAGING service (deployed from the `staging` branch). Named distinctly from the live
  # `firstback` prod service so the Blueprint creates a SEPARATE service + disk and never
  # touches production. When promoting staging -> prod, reconcile this name back to `firstback`.
  - type: web
    name: firstbackv2
    runtime: python
    plan: starter                 # ~$7/mo, always-on (the free plan sleeps + has no disk)
    buildCommand: pip install -r requirements.txt
    # ONE worker so exactly one reminder ticker runs and SQLite has a single
    # writer; threads handle request concurrency. Ample for a single business.
    startCommand: gunicorn app:app --workers 1 --threads 8 --timeout 120 --bind 0.0.0.0:$PORT
    disk:
      name: firstbackv2-data       # separate disk from prod's firstback-data (isolated staging DB)
      mountPath: /var/data        # durable disk: holds the DB BACKUP (plain file copies only)
      sizeGB: 1
    healthCheckPath: /login
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      # FIRSTBACK_DB_PATH is the DURABLE at-rest location on the network disk. With
      # FIRSTBACK_DB_LOCAL_MIRROR=1, SQLite actually runs on a fast LOCAL disk (/tmp) where it
      # never hangs, and this /var/data file becomes the snapshot we restore-on-boot + back-up
      # (timer + shutdown). Only plain file copies touch /var/data -- never a SQLite open. This
      # is the fix for the network-FS boot hang (see db.py + reference-firstback-wal-boot-hazard).
      - key: FIRSTBACK_DB_PATH
        value: /var/data/firstback.db
      - key: FIRSTBACK_DB_LOCAL_MIRROR
        value: "1"
      - key: FIRSTBACK_SECRET        # signs login cookies
        generateValue: true
      # Pre-deploy G1: FIRSTBACK_HTTPS=1 below arms the prod fail-fasts (config.py), which
      # REQUIRE these two -- without them a blueprint deploy boot-crashes. generateValue lets
      # Render mint a random value; change the owner password after first login.
      - key: FIRSTBACK_TOKEN_KEY     # encrypts stored Google OAuth tokens at rest (required when HTTPS=1)
        generateValue: true
      - key: FIRSTBACK_OWNER_PASSWORD  # first-login owner password (required when HTTPS=1); change after login
        generateValue: true
      - key: FIRSTBACK_TASKS_SECRET  # guards the scheduler endpoint /tasks/run-due
        generateValue: true
      - key: FIRSTBACK_RUN_TICKER    # start the reminders/follow-ups scheduler in-process
        value: "1"
      - key: FIRSTBACK_SCREEN_MODE    # call-screening rollout mode: monitor=watch+log only, enforce=act
        value: "monitor"
      - key: FIRSTBACK_HTTPS         # secure session cookies (Render serves HTTPS)
        value: "1"
      - key: FIRSTBACK_TZ            # <-- set to the business's timezone
        value: America/New_York
      # ---- Platform alert channel (ops must set real values in Render dashboard) ----
      # SMTP: owner alert emails route through this SMTP host. Set SMTP_USER + SMTP_PASS
      # as secrets in the dashboard (never commit real credentials).
      - key: SMTP_HOST
        value: smtp.resend.com   # placeholder — set real value in Render dashboard
        sync: false
      - key: SMTP_FROM
        value: alerts@firstback.app   # placeholder — set real value in Render dashboard
        sync: false
      # ALERT_FROM_NUMBER: the platform Twilio number owner-alert SMS send FROM.
      # Keeps owner alerts off the tenant's A2P customer-facing number (no A2P required).
      # Set the real E.164 number (+1...) as a secret in the Render dashboard.
      - key: ALERT_FROM_NUMBER
        value: ""   # placeholder — set real value in Render dashboard
        sync: false
      # ---- Add these as SECRETS in the Render dashboard (Environment tab) ----
      # The AI brain (pick one):
      #   FIRSTBACK_PROVIDER = claude     and  ANTHROPIC_API_KEY = sk-ant-...
      #   FIRSTBACK_PROVIDER = minimax    and  MINIMAX_API_KEY   = ...
      # (No key set => safe demo responder, fine for a first smoke test.)
      #
      # Real texts/calls (later, see USER_TO_DO.md):
      #   FIRSTBACK_PUBLIC_URL = https://<your-render-url>   (the code reads THIS exact key;
      #       a bare PUBLIC_BASE_URL is IGNORED — config.py does os.environ.get("FIRSTBACK_PUBLIC_URL"))
      #   TWILIO_ACCOUNT_SID / TWILIO_AUTH_TOKEN / TWILIO_FROM_NUMBER
      # Email alerts (optional):
      #   SMTP_HOST / SMTP_USER / SMTP_PASS / SMTP_FROM (see placeholders above)
      # First-login owner (optional; defaults to the seeded creds you then change):
      #   FIRSTBACK_OWNER_EMAIL / FIRSTBACK_OWNER_PASSWORD
      # AI VOICE answering (set these two ONLY when you deploy the firstback-voice service
      # below; until FIRSTBACK_VOICE_URL is set, the app + homepage stay text-led on their own):
      #   FIRSTBACK_VOICE_URL       = https://<firstback-voice service URL>   (flips voice on)
      #   FIRSTBACK_INTERNAL_SECRET = <same random value set on BOTH services>
      #   FIRSTBACK_VOICE_TTS       = <a ConversationRelay TTS voice id>      (optional but recommended)

# ---- AI voice answering (Phase 3): the ConversationRelay agent as a SECOND service. ----
# Flask/WSGI can't host the long-lived WebSocket ConversationRelay needs, so voice runs as its
# own uvicorn service. It does NOT need a shared database: with FIRSTBACK_WEB_URL set, the voice
# service relays every spoken turn + booking back to THIS web app over HTTP (/internal/voice/*,
# guarded by the shared FIRSTBACK_INTERNAL_SECRET), so the web app stays the single SQLite
# writer. (An earlier note here said "needs Postgres" -- that was over-cautious; the HTTP relay
# is already built in voice_service.py, so no shared DB is required.)
#
# TO TURN VOICE ON (turnkey):
#   1. Uncomment this service block, set its 4 dashboard secrets below, and deploy it.
#   2. On the MAIN service above, add  FIRSTBACK_VOICE_URL = <this voice service's https URL>.
#      That ONE var flips voice_configured true everywhere -- the homepage auto-becomes
#      voice-led, no code change.
#   3. Set the SAME  FIRSTBACK_INTERNAL_SECRET  on BOTH services (web + voice) so the
#      /internal/voice/* relay authenticates.
#   4. In the Twilio console, point the number's Voice webhook at the web app's inbound-voice
#      route (it returns the ConversationRelay TwiML that hands the call to wss://<voice URL>).
#
#  - type: web
#    name: firstback-voice
#    runtime: python
#    plan: starter
#    buildCommand: pip install -r requirements.txt
#    startCommand: uvicorn voice_service:fastapi_app --host 0.0.0.0 --port $PORT
#    envVars:
#      - key: PYTHON_VERSION
#        value: "3.12.7"
#      - key: FIRSTBACK_PROVIDER          # same brain as the text path
#        value: claude
#      - key: ANTHROPIC_API_KEY           # secret -- set in the dashboard
#        sync: false
#      - key: FIRSTBACK_WEB_URL           # the MAIN web app's https URL (relay target)
#        sync: false
#      - key: FIRSTBACK_INTERNAL_SECRET   # MUST match the main service's value
#        sync: false
#      - key: FIRSTBACK_VOICE_TTS         # a ConversationRelay TTS voice id (don't leave blank -- default sounds robotic)
#        sync: false
